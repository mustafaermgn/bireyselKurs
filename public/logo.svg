<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Path for top text -->
    <path id="top-curve" d="M 20 105 A 80 80 0 1 1 180 105" fill="none" />
    <!-- Path for bottom text -->
    <path id="bottom-curve" d="M 40 120 A 60 60 0 0 0 160 120" fill="none" />
  </defs>

  <!-- Outer Blue Ring -->
  <circle cx="100" cy="100" r="95" fill="#11619c" />
  
  <!-- Inner White Circle -->
  <circle cx="100" cy="100" r="70" fill="#ffffff" />

  <!-- Top Text -->
  <text fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="18" letter-spacing="1.5">
    <textPath href="#top-curve" startOffset="50%" text-anchor="middle">SİLOPİ BİREYSEL KURS</textPath>
  </text>

  <!-- Bottom Text -->
  <text fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="20">
    <textPath href="#bottom-curve" startOffset="50%" text-anchor="middle">2018</textPath>
  </text>

  <!-- Inner Graphics: The Book and Figures -->
  <g transform="translate(100, 95) scale(0.6)">
    <!-- Book Pages / Figures -->
    <!-- Yellow Left -->
    <path d="M -60 20 Q -40 40 0 50 Q -30 20 -40 -10 Q -45 5 -60 20 Z" fill="#fdb913" />
    <circle cx="-50" cy="-10" r="8" fill="#fdb913" />
    
    <!-- Pink Middle -->
    <path d="M -20 40 Q 0 50 30 45 Q 5 20 -5 -30 Q -15 0 -20 40 Z" fill="#e4005c" />
    <circle cx="-10" cy="-40" r="10" fill="#e4005c" />

    <!-- Teal Right -->
    <path d="M 10 40 Q 40 40 60 10 Q 30 15 20 -10 Q 15 10 10 40 Z" fill="#00aeb3" />
    
    <!-- Book Lines at Bottom -->
    <path d="M -50 55 Q 0 70 50 45" stroke="#11619c" stroke-width="4" fill="none" stroke-linecap="round" />
    <path d="M -45 65 Q 0 80 45 55" stroke="#e4005c" stroke-width="2" fill="none" stroke-linecap="round" />
  </g>

  <!-- Inner Bottom Text -->
  <text x="100" y="145" fill="#000000" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="8" text-anchor="middle" letter-spacing="0.5">
    SİLOPİ'NİN EĞİTİM YÜZÜ
  </text>
</svg>
